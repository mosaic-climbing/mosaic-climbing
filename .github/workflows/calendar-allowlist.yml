name: Calendar allowlist sync

# Mirrors the plan IDs that Mosaic's portal calendar SPA itself queries for
# into src/portal-visible-plan-ids.js. When the SPA's filter drifts (Nicole
# adds or retires a public program in the portal), this workflow opens a PR
# with the diff. Source of truth lives in the portal, not in this repo.
#
# Runs daily and on manual trigger. To re-run on demand: GitHub → Actions →
# "Calendar allowlist sync" → Run workflow.
#
# Required permissions are granted to the default GITHUB_TOKEN below — no
# additional secrets needed. `peter-evans/create-pull-request` does the
# branch / commit / PR work and dedupes against an existing open PR on
# the same head branch (so daily runs don't spawn duplicate PRs).

on:
  schedule:
    - cron: "13 4 * * *"  # daily at 04:13 UTC (pre-business hours)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Playwright
        working-directory: scripts
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Capture portal allowlist
        run: |
          node scripts/capture-calendar-input.mjs \
            --emit=planids \
            --write=src/portal-visible-plan-ids.js

      - name: Check for drift
        id: drift
        run: |
          if git diff --quiet src/portal-visible-plan-ids.js; then
            echo "No drift — exiting clean."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Drift detected:"
            git --no-pager diff src/portal-visible-plan-ids.js
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build human-readable diff
        if: steps.drift.outputs.changed == 'true'
        id: named_diff
        run: |
          set -euo pipefail

          # Fetch the plans catalog so we can join planIds to program names.
          # If the upstream is flaky we still want the PR to land, so on
          # failure we fall back to an empty catalog (the renderer will
          # label rows "(plan no longer in catalog)").
          if ! curl -fsS -X POST https://portal.mosaicclimbing.com/graphql-public \
               -H 'Content-Type: application/json' \
               -H 'User-Agent: mosaic-climbing-allowlist-sync/1.0 (+https://github.com/mosaic-climbing/mosaic-climbing)' \
               -d '{"query":"{ plans(first: 200) { edges { node { id slug name } } } }"}' \
               > /tmp/plans.json; then
            echo "WARNING: plans catalog fetch failed; falling back to empty catalog."
            echo '{"data":{"plans":{"edges":[]}}}' > /tmp/plans.json
          fi

          git --no-pager diff src/portal-visible-plan-ids.js \
            | python3 scripts/render-allowlist-diff.py /tmp/plans.json \
            > /tmp/named-diff.md

          echo "--- rendered diff section ---"
          cat /tmp/named-diff.md
          echo "--- end ---"

          {
            echo "body<<DIFF_BODY_EOF"
            cat /tmp/named-diff.md
            echo "DIFF_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Open PR
        if: steps.drift.outputs.changed == 'true'
        # SHA-pinned (not tag-pinned): peter-evans/create-pull-request is a
        # third-party action. Post the March 2026 tj-actions/Trivy supply-chain
        # attacks, tags are rewriteable and can be force-pushed to a malicious
        # commit, so we pin to the immutable commit SHA. Dependabot
        # (.github/dependabot.yml) bumps this SHA + comment automatically.
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          branch: bot/calendar-allowlist
          title: "chore: sync calendar allowlist with portal SPA"
          commit-message: "chore: sync calendar allowlist with portal SPA"
          add-paths: src/portal-visible-plan-ids.js
          delete-branch: true
          labels: calendar-allowlist
          body: |
            Auto-generated by `.github/workflows/calendar-allowlist.yml`.

            The set of plan IDs that Mosaic's public portal calendar SPA queries for has drifted from what's committed in `src/portal-visible-plan-ids.js`.

            ${{ steps.named_diff.outputs.body }}

            ---

            **How to review**
            - **Added** programs are new public offerings on Mosaic's portal. Merging surfaces them on the marketing calendar.
            - **Removed** programs were retired or made non-public in the portal. Merging stops surfacing them.
            - **Unexpected change** → spot-check <https://portal.mosaicclimbing.com/mos/n/calendar> in a browser before merging.

            Source: intercepted `StorefrontCalendarQuery.variables.input.planId` from a headless-Chromium load of the portal calendar; planId → name lookup via `plans(first: 200)` against `portal.mosaicclimbing.com/graphql-public`.
