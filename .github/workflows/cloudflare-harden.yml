name: Cloudflare zone hardening

# Manual trigger only — run this once after the domain has been added to
# Cloudflare and Cloudflare's nameservers are authoritative.
# Click "Run workflow" in the Actions tab to execute.
#
# Idempotent — safe to re-run if you change the script.
#
# Required GitHub secret:
#   CLOUDFLARE_API_TOKEN — token with Zone Settings: Edit + Zone: Read
#                          scoped to mosaicclimbing.com.
#                          Create at https://dash.cloudflare.com/profile/api-tokens

on:
  workflow_dispatch:
    inputs:
      zone:
        description: "Zone name (defaults to mosaicclimbing.com)"
        required: false
        default: "mosaicclimbing.com"

jobs:
  harden:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run hardening script
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_NAME: ${{ inputs.zone }}
        run: ./scripts/harden-cloudflare.sh
